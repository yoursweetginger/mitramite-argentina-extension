name: Build — Extension Artifacts

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-chrome:
    name: build-chrome
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Chrome extension
        run: pnpm build:chrome

      - name: Package Chrome zip
        run: |
          mkdir -p artifacts/chrome
          cd dist/chrome && zip -r ../../artifacts/chrome/extension.zip .

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chrome-extension
          path: artifacts/chrome/extension.zip
          retention-days: 90

  build-firefox:
    name: build-firefox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Firefox extension
        run: pnpm build:firefox

      - name: Package Firefox zip
        run: pnpm package:firefox

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: firefox-extension
          path: artifacts/firefox/
          retention-days: 90
